backend:
  name: git-gateway
  branch: main

media_folder: "public/uploads"
public_folder: "/uploads"

publish_mode: editorial_workflow

collections:
  - name: "blog"
    label: "Blog"
    folder: "src/content/blog"
    create: true
    slug: "{{slug}}"
    extension: "md"x
    format: "frontmatter"
    media_folder: "public/uploads/blog/{{slug}}"
    public_folder: "/uploads/blog/{{slug}}"
    fields:
      - label: "Title"
        name: "title"
        widget: "string"
      - label: "Description"
        name: "description"
        widget: "text"
      - label: "Publish Date"
        name: "pubDate"
        widget: "datetime"
        date_format: "MMM DD YYYY"
        time_format: false
      - label: "Hero Image"
        name: "heroImage"
        widget: "image"
        required: false
      - label: "Tags"
        name: "tags"
        widget: "list"
        required: false
        field:
          label: "Tag"
          name: "tag"
          widget: "string"
      - label: "Body"
        name: "body"
        widget: "markdown"
